#!/usr/bin/env python3
# dynamic_reconfigure configuration for mpc_cbf_arm_node
# Generated via catkin_generate_dynamic_reconfigure_options

PACKAGE = "pick_place"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# ── Adaptive safety margins ───────────────────────────────────────────────────
gen.add("epsilon_base_workspace", double_t, 0,
        "Base safety margin on each workspace face (m)",
        0.02, 0.0, 0.5)
gen.add("k_epsilon_workspace", double_t, 0,
        "Adaptive workspace margin gain (m per ms of RTT std)",
        0.001, 0.0, 0.05)

gen.add("epsilon_base_speed", double_t, 0,
        "Base safety margin on speed limit (m/s)",
        0.02, 0.0, 0.2)
gen.add("k_epsilon_speed", double_t, 0,
        "Adaptive speed margin gain ((m/s) per ms of RTT std)",
        0.0005, 0.0, 0.01)

# ── Constraint A: Acceleration CBF ───────────────────────────────────────────
gen.add("arm_accel_max", double_t, 0,
        "Max Cartesian acceleration for CBF constraint (m/s^2)",
        2.0, 0.1, 10.0)
gen.add("gamma_acc", double_t, 0,
        "CBF decay gain for acceleration constraint (0,1]",
        1.0, 0.01, 1.0)

# ── Constraint B: Jerk minimization weights ───────────────────────────────────
gen.add("jerk_weight_xy", double_t, 0,
        "Jerk penalty weight for x/y Cartesian axes",
        0.5, 0.0, 100.0)
gen.add("jerk_weight_z", double_t, 0,
        "Jerk penalty weight for z Cartesian axis",
        0.5, 0.0, 100.0)

# ── Adaptive horizon bounds (overridden per network mode by watchdog) ─────────
gen.add("N_min", int_t, 0,
        "Minimum MPC horizon (steps); raised by watchdog under degraded network",
        10, 1, 50)
gen.add("N_max", int_t, 0,
        "Maximum MPC horizon (steps); lowered by watchdog to pin horizon in POOR mode",
        25, 1, 50)

exit(gen.generate(PACKAGE, "mpc_cbf_arm_node", "MpcCbfArm"))
